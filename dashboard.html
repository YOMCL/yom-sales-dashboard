<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOM Sales Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; }
    .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
    .client-card { cursor: pointer; transition: all 0.15s; }
    .client-card:hover { border-color: #3b82f6; box-shadow: 0 4px 12px rgba(59,130,246,0.12); transform: translateY(-1px); }
    .client-card.active { border-color: #2563eb; background: #eff6ff; }
    .client-card.no-data { opacity: 0.45; cursor: default; pointer-events: none; }
    .up   { color: #16a34a; }
    .down { color: #dc2626; }
    .flat { color: #94a3b8; }
    #chart-wrap { position: relative; height: 280px; }
    .metric-tab { transition: all 0.12s; border-bottom: 2px solid transparent; }
    .metric-tab.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 600; }
    th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #64748b; }
    .mom-positive { background: #dcfce7; color: #15803d; border-radius: 4px; padding: 1px 5px; font-size: 11px; font-weight: 600; }
    .mom-negative { background: #fee2e2; color: #b91c1c; border-radius: 4px; padding: 1px 5px; font-size: 11px; font-weight: 600; }
    .mom-flat     { background: #f1f5f9; color: #64748b; border-radius: 4px; padding: 1px 5px; font-size: 11px; font-weight: 600; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Topbar -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
  <div class="max-w-screen-xl mx-auto px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">Y</div>
      <span class="font-semibold text-gray-900">YOM Sales</span>
      <span class="text-xs text-gray-400 hidden sm:block">Legacy Production · Todos los montos en CLP</span>
    </div>
    <div class="flex items-center gap-4">
      <div id="hdr-gmv" class="text-right hidden md:block">
        <div class="font-bold text-gray-900 text-sm" id="hdr-total">—</div>
        <div class="text-xs text-gray-400">GMV sin IVA (12m)</div>
      </div>
      <div class="text-xs text-gray-400" id="hdr-ts">—</div>
    </div>
  </div>
</header>

<div class="max-w-screen-xl mx-auto px-6 py-5 space-y-5">

  <!-- KPIs Globales -->
  <div id="global-kpis" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

  <!-- Grid de clientes -->
  <div>
    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Clientes — último mes disponible</p>
    <div id="client-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
  </div>

  <!-- Detalle -->
  <div id="detail" class="hidden space-y-4">

    <!-- Header cliente -->
    <div class="card p-5">
      <div class="flex flex-wrap items-start justify-between gap-4 mb-5">
        <div>
          <div class="flex items-center gap-2">
            <h2 id="d-name" class="text-xl font-bold text-gray-900"></h2>
            <span id="d-badge" class="hidden text-xs font-semibold bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full">COP→CLP</span>
          </div>
          <p id="d-domain" class="text-xs text-gray-400 mt-0.5"></p>
          <p id="d-period" class="text-xs text-gray-400"></p>
        </div>
        <div id="d-kpis" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
      </div>

      <!-- Tabs métricas -->
      <div class="flex gap-5 border-b border-gray-100 mb-4">
        <button class="metric-tab active pb-2 text-sm" data-metric="ventaSinIVA">GMV sin IVA</button>
        <button class="metric-tab pb-2 text-sm text-gray-500" data-metric="ventaConIVA">GMV con IVA</button>
        <button class="metric-tab pb-2 text-sm text-gray-500" data-metric="ordenes">Órdenes</button>
        <button class="metric-tab pb-2 text-sm text-gray-500" data-metric="comerciosActivos">Com. Activos</button>
      </div>

      <!-- Gráfico mensual -->
      <div id="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <!-- Tabla mensual -->
    <div class="card overflow-hidden">
      <div class="px-5 py-3 border-b border-gray-100">
        <h3 class="font-semibold text-gray-800 text-sm">Desglose mensual — últimos 12 meses</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-2.5 text-left">Mes</th>
              <th class="px-4 py-2.5 text-right">Órdenes</th>
              <th class="px-4 py-2.5 text-right">Com. Activos</th>
              <th class="px-4 py-2.5 text-right">% Activación</th>
              <th class="px-4 py-2.5 text-right">GMV sin IVA</th>
              <th class="px-4 py-2.5 text-right">GMV con IVA</th>
              <th class="px-4 py-2.5 text-right">Ticket prom.</th>
              <th class="px-4 py-2.5 text-right">Frec. compra</th>
              <th class="px-4 py-2.5 text-right">MoM %</th>
            </tr>
          </thead>
          <tbody id="monthly-tbody"></tbody>
          <tfoot id="monthly-tfoot" class="bg-gray-50 border-t-2 border-gray-200 font-semibold text-gray-800"></tfoot>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ── Helpers de formato ────────────────────────────────────
const clp  = n => n == null ? '—' : new Intl.NumberFormat('es-CL', { style:'currency', currency:'CLP', maximumFractionDigits:0 }).format(n);
const clpM = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (Math.abs(n) >= 1e9)  return '$' + (n/1e9).toFixed(1)  + 'B';
  if (Math.abs(n) >= 1e6)  return '$' + (n/1e6).toFixed(1)  + 'M';
  if (Math.abs(n) >= 1e3)  return '$' + (n/1e3).toFixed(0)  + 'K';
  return clp(n);
};
const pct  = n => n == null ? '—' : n.toFixed(1) + '%';
const num  = n => n == null ? '—' : new Intl.NumberFormat('es-CL').format(n);
const MONTHS = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const mLabel = (y,m) => `${MONTHS[m]} ${String(y).slice(2)}`;
const dateStr = iso => iso ? new Date(iso).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}) : '—';

function mom(arr, i, field) {
  if (i === 0 || !arr[i-1][field]) return null;
  return (arr[i][field] - arr[i-1][field]) / arr[i-1][field] * 100;
}
function momBadge(val) {
  if (val == null) return '<span class="mom-flat">—</span>';
  const sign = val >= 0.5 ? '↑' : val <= -0.5 ? '↓' : '→';
  const cls  = val >= 0.5 ? 'mom-positive' : val <= -0.5 ? 'mom-negative' : 'mom-flat';
  return `<span class="${cls}">${sign} ${Math.abs(val).toFixed(1)}%</span>`;
}

// ── Estado ────────────────────────────────────────────────
let activeClient = null, activeChart = null, activeMetric = 'ventaSinIVA';

// ── Init ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (typeof YOM_DATA === 'undefined') {
    document.body.innerHTML = `<div class="flex items-center justify-center h-screen flex-col gap-3 text-gray-400">
      <p class="text-lg font-semibold">Sin datos cargados</p>
      <code class="bg-gray-100 text-gray-600 text-sm px-3 py-2 rounded">mongosh "&lt;URI&gt;" --quiet --file extract.js > data.js</code>
    </div>`;
    return;
  }

  // Timestamp
  const d = new Date(YOM_DATA.extractedAt);
  document.getElementById('hdr-ts').textContent = 'Actualizado ' + d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});

  renderGlobal();
  renderGrid();
  setupTabs();

  // Abrir primer cliente con datos
  const first = YOM_DATA.clients.find(c => !c.sinDatos && c.mensual.length);
  if (first) openClient(first);
});

// ── KPIs globales (últimos 12 meses, solo CLP) ───────────
function renderGlobal() {
  const cl = YOM_DATA.clients.filter(c => !c.sinDatos);

  // Sumar solo el período últimos 12m (usando mensual)
  let gmv12 = 0, ords12 = 0, coms12 = new Set();
  cl.forEach(c => {
    c.mensual.forEach(m => { gmv12 += m.ventaSinIVA; ords12 += m.ordenes; });
    c.mensual.forEach(m => { /* comercios distintos no disponible globalmente */ });
  });

  const totalComs = cl.reduce((a,c) => a + c.comercios, 0);
  const totalReg  = cl.reduce((a,c) => a + c.comerciosRegistrados, 0);
  const actRate   = totalReg > 0 ? (totalComs / totalReg * 100) : 0;

  document.getElementById('hdr-total').textContent = clpM(gmv12);

  document.getElementById('global-kpis').innerHTML = [
    { label: 'GMV sin IVA (12m)',       value: clpM(gmv12),         sub: cl.length + ' clientes activos',       color: 'text-blue-700' },
    { label: 'Órdenes (12m)',            value: num(ords12),          sub: 'status: processing',                  color: 'text-gray-900' },
    { label: 'Comercios activos',        value: num(totalComs),       sub: 'con al menos 1 orden',                color: 'text-gray-900' },
    { label: 'Tasa activación global',   value: pct(actRate),         sub: totalComs + ' de ' + num(totalReg) + ' registrados', color: actRate >= 50 ? 'text-green-700' : 'text-orange-600' },
  ].map(k => `
    <div class="card p-4 hover:shadow-md transition-shadow">
      <div class="text-2xl font-bold ${k.color}">${k.value}</div>
      <div class="text-sm font-medium text-gray-700 mt-1">${k.label}</div>
      <div class="text-xs text-gray-400 mt-0.5">${k.sub}</div>
    </div>
  `).join('');
}

// ── Grid de clientes ──────────────────────────────────────
function renderGrid() {
  document.getElementById('client-grid').innerHTML = YOM_DATA.clients.map(c => {
    if (c.sinDatos) return `
      <div class="card client-card no-data p-3">
        <div class="text-xs font-bold text-gray-600">${c.name}</div>
        <div class="text-xs text-gray-400 mt-1">Sin datos</div>
      </div>`;

    const last2 = c.mensual.slice(-2);
    const lastM = last2[last2.length - 1];
    const prevM = last2.length > 1 ? last2[0] : null;
    const momVal = lastM && prevM && prevM.ventaSinIVA
      ? (lastM.ventaSinIVA - prevM.ventaSinIVA) / prevM.ventaSinIVA * 100
      : null;
    const momCls  = momVal == null ? 'flat' : momVal >= 0.5 ? 'up' : momVal <= -0.5 ? 'down' : 'flat';
    const momSign = momVal == null ? '' : momVal >= 0.5 ? '↑' : momVal <= -0.5 ? '↓' : '→';
    const actRate = c.comerciosRegistrados > 0
      ? (lastM ? lastM.comerciosActivos / c.comerciosRegistrados * 100 : 0) : null;

    return `
      <div class="card client-card p-3" data-domain="${c.domain}">
        <div class="flex items-center justify-between">
          <div class="text-xs font-bold text-gray-800 truncate">${c.name}</div>
          ${c.currency === 'COP' ? `<span class="text-xs bg-orange-100 text-orange-600 rounded px-1">COP</span>` : ''}
        </div>
        <div class="text-base font-bold text-blue-700 mt-1.5 leading-none">${lastM ? clpM(lastM.ventaSinIVA) : '—'}</div>
        <div class="text-xs text-gray-500 mt-0.5">${lastM ? mLabel(lastM.year, lastM.month) : ''}</div>
        <div class="flex items-center justify-between mt-2">
          <span class="text-xs text-gray-400">${lastM ? num(lastM.ordenes) + ' órd.' : ''}</span>
          <span class="${momCls} text-xs font-semibold">${momSign}${momVal != null ? Math.abs(momVal).toFixed(1)+'%' : ''}</span>
        </div>
        ${actRate != null ? `<div class="mt-1.5 h-1 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-1 rounded-full ${actRate >= 50 ? 'bg-green-400' : 'bg-orange-400'}" style="width:${Math.min(100,actRate).toFixed(0)}%"></div>
        </div>
        <div class="text-xs text-gray-400 mt-0.5">${actRate.toFixed(0)}% activación</div>` : ''}
      </div>`;
  }).join('');

  document.querySelectorAll('.client-card:not(.no-data)').forEach(el => {
    el.addEventListener('click', () => {
      const c = YOM_DATA.clients.find(x => x.domain === el.dataset.domain);
      openClient(c);
    });
  });
}

// ── Abrir cliente ─────────────────────────────────────────
function openClient(client) {
  activeClient = client;
  document.querySelectorAll('.client-card').forEach(el => el.classList.remove('active'));
  const card = document.querySelector(`.client-card[data-domain="${client.domain}"]`);
  if (card) card.classList.add('active');

  document.getElementById('detail').classList.remove('hidden');
  document.getElementById('d-name').textContent   = client.name;
  document.getElementById('d-domain').textContent = client.domain;
  document.getElementById('d-period').textContent = dateStr(client.primeraOrden) + ' → ' + dateStr(client.ultimaOrden) + ' (mostrando últimos 12m)';

  // Badge COP si aplica
  const badge = document.getElementById('d-badge');
  if (client.currency === 'COP') { badge.classList.remove('hidden'); }
  else { badge.classList.add('hidden'); }

  // KPI cards
  const mn = client.mensual;
  const lastM = mn[mn.length - 1];
  const prevM = mn.length > 1 ? mn[mn.length - 2] : null;
  const momGMV = lastM && prevM && prevM.ventaSinIVA
    ? (lastM.ventaSinIVA - prevM.ventaSinIVA) / prevM.ventaSinIVA * 100 : null;
  const actRate12 = client.comerciosRegistrados > 0
    ? client.mensual.reduce((a,m) => Math.max(a, m.comerciosActivos), 0) / client.comerciosRegistrados * 100 : null;
  const avgTicket = client.ordenes > 0 ? client.ventaSinIVA / client.ordenes : 0;
  const avgFreq   = client.comercios > 0 ? client.ordenes / client.comercios : 0;

  document.getElementById('d-kpis').innerHTML = [
    { label: 'GMV sin IVA (total)',   value: clpM(client.ventaSinIVA),        sub: 'all-time processing' },
    { label: 'Órdenes (total)',        value: num(client.ordenes),              sub: 'processing' },
    { label: 'Comercios activos',      value: num(client.comercios),            sub: 'de ' + num(client.comerciosRegistrados) + ' registrados' },
    { label: 'MoM último mes',         value: momBadge(momGMV),                sub: lastM ? mLabel(lastM.year, lastM.month) : '—' },
    { label: 'Tasa activación (max)',  value: actRate12 != null ? pct(actRate12) : '—', sub: 'máx. mensual 12m' },
    { label: 'Ticket promedio',        value: clpM(avgTicket),                 sub: 'GMV/órdenes all-time' },
    { label: 'Frec. compra',           value: avgFreq.toFixed(1) + 'x',        sub: 'órdenes/comercio' },
    { label: 'GMV con IVA (total)',    value: clpM(client.ventaConIVA),        sub: 'all-time processing' },
  ].map(k => `
    <div class="bg-gray-50 rounded-lg px-3 py-2.5 text-right">
      <div class="text-base font-bold text-gray-900">${k.value}</div>
      <div class="text-xs text-gray-600 leading-tight">${k.label}</div>
      <div class="text-xs text-gray-400">${k.sub}</div>
    </div>
  `).join('');

  document.getElementById('d-kpis').className = 'grid grid-cols-2 md:grid-cols-4 gap-2';

  renderChart();
  renderTable();
  document.getElementById('detail').scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── Gráfico ───────────────────────────────────────────────
function renderChart() {
  if (activeChart) { activeChart.destroy(); activeChart = null; }
  const mn = activeClient.mensual;
  if (!mn.length) return;

  const labels = mn.map(m => mLabel(m.year, m.month));
  const vals   = mn.map(m => m[activeMetric]);
  const momVals = mn.map((m,i) => i === 0 ? null : mom(mn, i, activeMetric));

  const metricLabels = {
    ventaSinIVA: 'GMV sin IVA', ventaConIVA: 'GMV con IVA',
    ordenes: 'Órdenes', comerciosActivos: 'Com. Activos'
  };
  const isMoney = activeMetric === 'ventaSinIVA' || activeMetric === 'ventaConIVA';

  activeChart = new Chart(document.getElementById('chart'), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: metricLabels[activeMetric],
          data: vals,
          backgroundColor: '#3b82f6',
          borderRadius: 5,
          yAxisID: 'y',
          order: 2
        },
        {
          type: 'line',
          label: 'MoM %',
          data: momVals,
          borderColor: '#f59e0b',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#f59e0b',
          tension: 0.3,
          yAxisID: 'y2',
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.datasetIndex === 0) return ` ${metricLabels[activeMetric]}: ${isMoney ? clpM(ctx.raw) : num(ctx.raw)}`;
              if (ctx.raw == null) return null;
              return ` MoM: ${ctx.raw >= 0 ? '+' : ''}${ctx.raw.toFixed(1)}%`;
            }
          }
        }
      },
      scales: {
        y: {
          position: 'left',
          grid: { color: '#f1f5f9' },
          ticks: { callback: v => isMoney ? clpM(v) : num(v), font: { size: 11 } }
        },
        y2: {
          position: 'right',
          grid: { display: false },
          ticks: { callback: v => (v == null ? '' : v.toFixed(1) + '%'), font: { size: 11 } }
        },
        x: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });
}

// ── Tabla mensual ─────────────────────────────────────────
function renderTable() {
  const mn = activeClient.mensual;
  const reg = activeClient.comerciosRegistrados;

  let totOrd=0, totSin=0, totCon=0;
  mn.forEach(m => { totOrd+=m.ordenes; totSin+=m.ventaSinIVA; totCon+=m.ventaConIVA; });

  document.getElementById('monthly-tbody').innerHTML = mn.map((m, i) => {
    const momVal  = mom(mn, i, 'ventaSinIVA');
    const actPct  = reg > 0 ? m.comerciosActivos / reg * 100 : null;
    const ticket  = m.ordenes > 0 ? m.ventaSinIVA / m.ordenes : 0;
    const freq    = m.comerciosActivos > 0 ? m.ordenes / m.comerciosActivos : 0;
    return `<tr class="border-t border-gray-50 hover:bg-blue-50/40">
      <td class="px-4 py-2.5 font-medium text-gray-800 whitespace-nowrap">${mLabel(m.year, m.month)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${num(m.ordenes)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${num(m.comerciosActivos)}</td>
      <td class="px-4 py-2.5 text-right">${actPct != null ? pct(actPct) : '—'}</td>
      <td class="px-4 py-2.5 text-right font-medium tabular-nums">${clpM(m.ventaSinIVA)}</td>
      <td class="px-4 py-2.5 text-right text-gray-600 tabular-nums">${clpM(m.ventaConIVA)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${clpM(ticket)}</td>
      <td class="px-4 py-2.5 text-right tabular-nums">${freq.toFixed(1)}x</td>
      <td class="px-4 py-2.5 text-right">${momBadge(momVal)}</td>
    </tr>`;
  }).join('');

  document.getElementById('monthly-tfoot').innerHTML = `<tr>
    <td class="px-4 py-2.5">Total / Prom.</td>
    <td class="px-4 py-2.5 text-right tabular-nums">${num(totOrd)}</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right tabular-nums">${clpM(totSin)}</td>
    <td class="px-4 py-2.5 text-right tabular-nums">${clpM(totCon)}</td>
    <td class="px-4 py-2.5 text-right tabular-nums">${clpM(totOrd > 0 ? totSin/totOrd : 0)}</td>
    <td class="px-4 py-2.5 text-right">—</td>
    <td class="px-4 py-2.5 text-right">—</td>
  </tr>`;
}

// ── Tabs métricas ─────────────────────────────────────────
function setupTabs() {
  document.querySelectorAll('.metric-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.metric-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeMetric = tab.dataset.metric;
      if (activeClient) renderChart();
    });
  });
}
</script>
</body>
</html>
